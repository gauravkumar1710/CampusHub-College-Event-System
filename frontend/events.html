<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - CampusHub</title>
    <!-- Use bootstrap grid -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--bg-light);">

    <!-- Standard navbar for events page -->
    <nav class="home-nav">
        <a href="index.html" class="brand-logo">
            <i class="bi bi-broadcast brand-icon"></i> CampusHub
        </a>
        <div class="d-flex align-items-center gap-3">
            <form action="events.html" method="GET" class="nav-search m-0">
                <i class="bi bi-search"></i>
                <input type="text" name="q" placeholder="Search events...">
            </form>
            <a href="#" style="color:var(--text-primary); font-size:1.2rem;"><i class="bi bi-bell-fill"></i></a>
            <div class="nav-links d-flex align-items-center">
                <a href="index.html">Home</a>
                <a href="events.html" class="active">Events</a>
                <a href="login.html" class="ms-4">Login</a>
                <a href="register.html" class="btn-lime ms-3 py-2 px-4">Get Started</a>
            </div>
        </div>
    </nav>
    
    <!-- Mobile Bottom Navigation -->
    <div class="mobile-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-door"></i>
            <span>Home</span>
        </a>
        <a href="events.html" class="nav-item active">
            <i class="bi bi-calendar-event-fill"></i>
            <span>Events</span>
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-calendar-week"></i>
            <span>Schedule</span>
        </a>
        <a href="dashboard.html" class="nav-item" id="nav-dash-mobile">
            <i class="bi bi-person"></i>
            <span>Profile</span>
        </a>
    </div>

    <div style="padding: 40px 24px;">
        <div class="d-flex flex-column" style="margin-bottom: 30px;">
            <div class="pulse-title-sm">LIVE UPDATES</div>
            <h2 class="pulse-title-lg mb-0" style="font-size:2.5rem;">ALL <span>EVENTS</span></h2>
        </div>
        
        <div class="category-filters" id="categoryFilters">
            <button class="filter-pill active" data-category="All">All Events</button>
            <button class="filter-pill" data-category="Tech">Tech & Coding</button>
            <button class="filter-pill" data-category="Cultural">Cultural & Arts</button>
            <button class="filter-pill" data-category="Sports">Sports & Fitness</button>
            <button class="filter-pill" data-category="Academic">Academic & Seminars</button>
            <button class="filter-pill" data-category="General">General</button>
        </div>

        <div id="alertBox" class="alert d-none" role="alert" style="padding:15px; border-radius:8px; margin-bottom:20px;"></div>
        <div class="row g-4 pb-5" id="allEventsContainer">
            <!-- Events loaded via JS -->
            <div class="col-12 text-muted">Loading events...</div>
        </div>
    </div>

    <!-- Need minimal script to toggle nav links and load events -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/interactivity.js"></script>
    <script src="js/main.js"></script>
    <script src="js/events.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('campushub_user'));
            if(user) {
                const navLogin = document.getElementById('nav-login');
                const navReg = document.getElementById('nav-register');
                if(navLogin) navLogin.style.display = 'none';
                if(navReg) navReg.style.display = 'none';
                document.getElementById('nav-dash').style.display = 'block';
            }
            loadEventsForGrid();
        });

        async function loadEventsForGrid(category = 'All') {
            const container = document.getElementById('allEventsContainer');
            try {
                const res = await fetch(`${API_BASE_URL}/events/list.php`);
                const data = await res.json();
                container.innerHTML = '';
                if(data.events && data.events.length > 0) {
                    let filtered = data.events;
                    if(category !== 'All') {
                        filtered = filtered.filter(e => e.category && e.category.includes(category) || (category==='Tech' && e.category==='Tech & Coding') || (category==='Cultural' && e.category==='Cultural & Arts') || (category==='Sports' && e.category==='Sports & Fitness') || (category==='Academic' && e.category==='Academic & Seminars'));
                    }
                    
                    // Native Search Filter Logic
                    const urlParams = new URLSearchParams(window.location.search);
                    const query = urlParams.get('q');
                    if (query) {
                        const lowerQ = query.toLowerCase();
                        filtered = filtered.filter(e => 
                            e.title.toLowerCase().includes(lowerQ) ||
                            (e.description && e.description.toLowerCase().includes(lowerQ)) ||
                            (e.location && e.location.toLowerCase().includes(lowerQ))
                        );
                    }
                    
                    if(filtered.length === 0) {
                        container.innerHTML = '<div class="col-12 text-muted">No events found matching your filter/search.</div>';
                        return;
                    }

                    filtered.forEach((ev, idx) => {
                        const btnClass = (idx % 2 === 0) ? 'btn-teal' : 'btn-purple-sm';
                        const img = `https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=500&q=80&auto=format&fit=crop`;
                        const dateSeg = ev.event_date.split(' ');
                        const date = dateSeg[0];
                        const time = dateSeg[1] || '12:00 PM';
                        
                        const isFull = parseInt(ev.registered_count) >= parseInt(ev.capacity);

                        // Countdown Logic
                        const eventTime = new Date(ev.event_date).getTime();
                        const now = new Date().getTime();
                        const diff = eventTime - now;
                        let countdownText = "Event Passed";
                        if (diff > 0) {
                            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            countdownText = `Starts in ${days}d ${hours}h`;
                        }

                        const div = document.createElement('div');
                        div.className = `col-md-4 mb-4 animate-slide-up stagger-${(idx % 5) + 1}`;
                        div.innerHTML = `
                        <div class="event-card card-magnetic glow-on-hover">
                            <div class="card-img-wrap">
                                <img src="${img}" alt="Event">
                                <span class="card-tag">${ev.category || 'General'}</span>
                            </div>
                            <div class="card-body">
                                <h4 class="card-title">${escapeHTML(ev.title)}</h4>
                                <div class="card-meta">
                                    <div><i class="bi bi-calendar3"></i> ${date} • ${time}</div>
                                    <div><i class="bi bi-geo-alt-fill"></i> ${escapeHTML(ev.location)}</div>
                                </div>
                                <div class="event-countdown mb-4">
                                    <i class="bi bi-lightning-charge-fill"></i> ${countdownText}
                                </div>
                                <div class="card-action mt-3" id="card_action_${ev.id}">
                                    <button onclick="openRegistrationModal(${ev.id}, '${ev.event_date}')" class="btn-teal" ${isFull ? 'disabled' : ''}>
                                        ${isFull ? 'CAPACITY REACHED' : 'SECURE PASS'}
                                    </button>
                                </div>
                                <div class="admin-actions mt-3 pt-3 border-top d-none" id="admin_actions_${ev.id}">
                                    <a href="${API_BASE_URL}/events/print_students.php?event_id=${ev.id}&user_id=${JSON.parse(localStorage.getItem('campushub_user'))?.id}" target="_blank" class="btn btn-outline-primary btn-sm w-100 py-2 fw-bold mb-2">
                                        <i class="bi bi-file-earmark-pdf-fill"></i> VIEW STUDENTS (PDF)
                                    </a>
                                    <button class="btn btn-outline-danger btn-sm w-100 py-2 fw-bold" onclick="deleteEvent(${ev.id}, '${escapeHTML(ev.title)}')">
                                        <i class="bi bi-trash3-fill"></i> DELETE EVENT
                                    </button>
                                </div>
                            </div>
                        </div>
                        `;
                        container.appendChild(div);
                        
                        // Check ownership to adjust buttons
                        const user = JSON.parse(localStorage.getItem('campushub_user'));
                        if (user && (user.role === 'Admin' || user.role === 'Organizer')) {
                            document.getElementById(`card_action_${ev.id}`).innerHTML = ''; // Remove Secure Pass for Admins
                        }
                        if (user && (user.role === 'Admin' || (user.role === 'Organizer' && user.id == ev.organizer_id))) {
                            document.getElementById(`admin_actions_${ev.id}`).classList.remove('d-none');
                        }
                    });
                    if(typeof observeNewElements === 'function') observeNewElements();
                } else {
                    container.innerHTML = '<div class="col-12 text-muted">No events found.</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="col-12" style="color:red;">Error loading events.</div>';
            }
        }

        // Filter attach
        document.getElementById('categoryFilters')?.addEventListener('click', (e) => {
            if(e.target.classList.contains('filter-pill')) {
                document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                let cat = e.target.getAttribute('data-category');
                loadEventsForGrid(cat);
            }
        });
    </script>
</body>
</html>
