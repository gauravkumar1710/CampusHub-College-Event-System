<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light text-dark">

    <nav class="home-nav">
        <a href="index.html" class="brand-logo">
            <i class="bi bi-broadcast brand-icon"></i> CampusHub
        </a>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5" style="background:var(--bg-card); border:1px solid var(--border-dark); border-radius:24px;">
                    <div class="text-center mb-4">
                        <h2 class="pulse-title-lg" style="font-size:2rem;">CREATE <span>ACCOUNT</span></h2>
                        <p class="text-muted">Join the CampusHub Network</p>
                    </div>
                    
                    <div id="alertBox" class="alert d-none" role="alert"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label" style="text-transform:uppercase; font-size:0.8rem; letter-spacing:0.05em; color:var(--neon-purple);">Full Name</label>
                            <input type="text" class="form-control form-input" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="text-transform:uppercase; font-size:0.8rem; letter-spacing:0.05em; color:var(--neon-purple);">Email address</label>
                            <input type="email" class="form-control form-input" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="text-transform:uppercase; font-size:0.8rem; letter-spacing:0.05em; color:var(--neon-purple);">Password</label>
                            <input type="password" class="form-control form-input" id="password" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" style="text-transform:uppercase; font-size:0.8rem; letter-spacing:0.05em; color:var(--neon-purple);">Role</label>
                            <select class="form-select form-input" id="role" style="height:auto;">
                                <option value="Student">Student</option>
                                <option value="Organizer">Organizer</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-lime w-100 py-3">CREATE ACCOUNT <i class="bi bi-shield-lock-fill ms-2"></i></button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted">Already verified? <a href="login.html" style="color:var(--neon-lime); text-decoration:none; font-weight:700;">Authenticate here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/interactivity.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
