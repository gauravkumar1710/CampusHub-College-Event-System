<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - CampusHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand brand-logo">
                <i class="bi bi-broadcast brand-icon"></i> 
                <span class="brand-text">CampusHub</span>
            </div>
            
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><i class="bi bi-person-video2"></i> Dashboard</a></li>
                <li><a href="events.html"><i class="bi bi-stack"></i> My Events</a></li>
                <li><a href="create-event.html" class="active"><i class="bi bi-pencil-square"></i> Create Event</a></li>
                <li><a href="#"><i class="bi bi-people-fill"></i> Manage Users</a></li>
                <li style="margin-top: 80px;"><a href="#" onclick="logout()"><i class="bi bi-power"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content" style="padding:0; display:flex;">
            <!-- Center illustration area -->
            <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-start; padding:40px; position:relative; background:var(--bg-dark);">
                <div class="pulse-title-sm mb-2">NEW INSTANCE</div>
                <h1 class="pulse-title-lg" style="font-size:3rem; margin-bottom:20px;">CREATE<br><span>EVENT</span></h1>
                <p style="color:var(--text-muted); font-size:1.1rem; max-width:400px; line-height:1.6; margin-bottom:auto;">Organize engaging activities, manage RSVPs seamlessly, and bring your campus together.</p>
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1470&auto=format&fit=crop" style="width:100%; max-width:500px; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.5); filter:grayscale(30%); border:1px solid var(--border-dark);" alt="Illustration">
            </div>

            <!-- Right Panel Form -->
            <div class="right-panel d-flex flex-column h-100" style="background:var(--bg-card); overflow-y:auto; position:relative; min-width:420px; box-sizing: border-box; border-left:1px solid var(--border-dark);">
                <h3 style="display:flex; justify-content:space-between; align-items:center; color:var(--text-primary); text-transform:uppercase; font-weight:800; font-size:1.2rem;">
                    EVENT PARAMETERS
                    <a href="dashboard.html" style="color:var(--text-muted); font-size:1.5rem; text-decoration:none;"><i class="bi bi-x"></i></a>
                </h3>
                
                <div id="alertBox" class="alert d-none" role="alert" style="padding:15px; border-radius:8px; margin-bottom:20px; font-size:0.9rem;"></div>

                <form id="createEventForm" class="d-flex flex-column" style="flex-grow:1;">
                    <label class="form-label">Event Title</label>
                    <input type="text" class="form-input" id="title" required>

                    <label class="form-label">Description</label>
                    <textarea class="form-input" id="description" rows="3" required></textarea>

                    <label class="form-label">Category</label>
                    <select class="form-input" id="category" required style="margin-bottom: 20px; padding: 12px; border-radius: 8px;">
                        <option value="General">General</option>
                        <option value="Tech">Tech & Cyber</option>
                        <option value="Cultural">Art & Culture</option>
                        <option value="Sports">Physical & Stamina</option>
                        <option value="Academic">Academic Hub</option>
                    </select>

                    <div style="display:flex; gap:16px;">
                        <div style="flex:1;">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-input" id="event_date_only" required>
                        </div>
                        <div style="flex:1;">
                            <label class="form-label">Time</label>
                            <input type="time" class="form-input" id="event_time_only" required>
                        </div>
                    </div>

                    <label class="form-label">Location Coordinates</label>
                    <input type="text" class="form-input" id="location" required>

                    <label class="form-label">Max Capacity</label>
                    <input type="number" class="form-input" id="capacity" required>

                    <label class="form-label">Event Cover Art (Optional)</label>
                    <input type="file" class="form-input" id="event_image" accept="image/png, image/jpeg, image/webp" style="padding:10px; margin-bottom: 20px;">

                    <div style="margin-top:auto;">
                        <button type="submit" class="btn-lime w-100 py-3" style="border-radius:12px; display:block;">PUBLISH EVENT</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <div class="mobile-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-door"></i>
            <span>Home</span>
        </a>
        <a href="events.html" class="nav-item">
            <i class="bi bi-calendar-event"></i>
            <span>Events</span>
        </a>
        <a href="dashboard.html" class="nav-item active">
            <i class="bi bi-clipboard-data-fill"></i>
            <span>Stats</span>
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-person"></i>
            <span>Profile</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/interactivity.js"></script>
    <script src="js/main.js"></script>
    <script src="js/events.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('campushub_user'));
            if (!user || (user.role !== 'Organizer' && user.role !== 'Admin')) {
                window.location.href = 'dashboard.html';
            }

            const form = document.getElementById('createEventForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                // Combine date and time
                const d = document.getElementById('event_date_only').value;
                const t = document.getElementById('event_time_only').value;
                const event_date = d + ' ' + t + ':00'; // MySQL datetime format
                
                const title = document.getElementById('title').value;
                const description = document.getElementById('description').value;
                const category = document.getElementById('category').value;
                const location = document.getElementById('location').value;
                const capacity = document.getElementById('capacity').value;

                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating...';
                
                try {
                    const formData = new FormData();
                    formData.append('title', title);
                    formData.append('description', description);
                    formData.append('category', category);
                    formData.append('event_date', event_date);
                    formData.append('location', location);
                    formData.append('capacity', capacity);
                    formData.append('organizer_id', user.id);
                    
                    const imgFile = document.getElementById('event_image').files[0];
                    if (imgFile) {
                        formData.append('image', imgFile);
                    }

                    const res = await fetch(`${API_BASE_URL}/events/create.php`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();

                    if (data.status === 'success') {
                        showPremiumToast('success', 'Event created successfully!');
                        form.reset();
                        setTimeout(() => window.location.href = 'dashboard.html', 1500);
                    } else {
                        showPremiumToast('danger', data.message || 'Error occurred');
                    }
                } catch (err) {
                    showPremiumToast('danger', 'Failed to create event.');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Event';
                }
            });
        });
    </script>
</body>
</html>
